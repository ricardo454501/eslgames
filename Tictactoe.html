<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tic Tac Toe</title>
  <style>
    :root{
      --bg1:#6c63ff;
      --bg2:#23c4ed;
      --bg3:#ffb703;
      --card:rgba(255,255,255,.92);
      --ink:#17223b;
      --muted:#6b7280;
      --x:#ff4f7b;
      --o:#2eb3ff;
      --win:#1bd760;
      --shadow:0 24px 70px rgba(0,0,0,.22);
      --soft:0 12px 28px rgba(0,0,0,.16);
      --radius:30px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    html,body{height:100%;margin:0;font-family:Inter,ui-rounded,"Arial Rounded MT Bold",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);overflow:hidden}
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.45), transparent 28%),
        radial-gradient(circle at 90% 20%, rgba(255,183,3,.45), transparent 28%),
        linear-gradient(135deg,var(--bg1),var(--bg2) 56%,var(--bg3));
    }

    .bubble{position:absolute;border-radius:999px;background:rgba(255,255,255,.18);filter:blur(.2px);animation:float 8s ease-in-out infinite;pointer-events:none}
    .b1{width:170px;height:170px;left:6vw;top:10vh}.b2{width:115px;height:115px;right:8vw;top:12vh;animation-delay:-2s}.b3{width:210px;height:210px;right:12vw;bottom:8vh;animation-delay:-4s}.b4{width:90px;height:90px;left:15vw;bottom:13vh;animation-delay:-1s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.04)}}

    .app{position:relative;width:min(96vw,980px);height:min(94vh,720px);display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px;z-index:2}
    .panel,.game-card{background:var(--card);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.55);box-shadow:var(--shadow);border-radius:var(--radius)}
    .panel{padding:22px;display:flex;flex-direction:column;gap:16px;overflow:visible}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
    .logo-mark{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--x),var(--o));color:#fff;font-size:27px;font-weight:1000;box-shadow:var(--soft);transform:rotate(-5deg)}
    h1{font-size:32px;line-height:.95;margin:0;letter-spacing:-1.2px}

    .section-title{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#7c8495;margin:8px 0 -6px}
    .segmented{display:grid;grid-template-columns:1fr 1fr;gap:8px}.segmented.three{grid-template-columns:repeat(3,1fr)}.segmented.five{grid-template-columns:repeat(5,1fr)}.segmented.five button{padding:12px 6px}
    button{border:0;border-radius:18px;padding:13px 14px;font-weight:900;font-size:14px;color:var(--ink);background:#f2f5ff;box-shadow:inset 0 -2px 0 rgba(0,0,0,.08);cursor:pointer;transition:filter .16s ease,box-shadow .16s ease,background .16s ease}
    button:hover{filter:brightness(1.02)}
    button:active{transform:scale(.98)}
    button.active{color:#fff;background:linear-gradient(135deg,var(--bg1),var(--o));box-shadow:0 12px 24px rgba(46,179,255,.24)}
    .primary{width:100%;font-size:17px;padding:16px 18px;color:#fff;background:linear-gradient(135deg,var(--x),#ff8a3d);box-shadow:0 15px 28px rgba(255,79,123,.28)}
    .ghost{background:rgba(255,255,255,.68)}

    .name-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;font-weight:900;color:#737b8d}.field input{width:100%;border:0;border-radius:16px;background:#f3f6ff;padding:13px 12px;font-weight:900;color:var(--ink);outline:2px solid transparent}.field input:focus{outline-color:rgba(46,179,255,.45);background:#fff}
    .scoreboard{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:auto}.score{background:#fff;border-radius:20px;padding:13px 10px;text-align:center;box-shadow:var(--soft)}.score .label{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase}.score .num{font-size:27px;font-weight:1000;margin-top:2px}.score.x .num{color:var(--x)}.score.o .num{color:var(--o)}

    .game-card{position:relative;padding:22px;display:grid;grid-template-rows:86px 1fr;gap:8px;overflow:hidden}
    .topbar{display:grid;place-items:center;min-height:76px;pointer-events:none}.status{min-height:62px;width:min(100%,460px);display:flex;align-items:center;justify-content:center;gap:13px;background:#fff;border-radius:22px;padding:12px 16px;box-shadow:var(--soft);text-align:center;opacity:0;transform:translateY(-10px) scale(.96);transition:opacity .22s ease,transform .22s ease}.status.show{opacity:1;transform:translateY(0) scale(1)}.turn-badge{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;color:#fff;font-size:26px;font-weight:1000;background:var(--x);flex:0 0 auto}.turn-badge.o{background:var(--o)}.status-text{font-weight:1000;font-size:18px;line-height:1.1}.status-sub{font-size:13px;color:var(--muted);font-weight:800;margin-top:2px}
    .board-wrap{display:grid;place-items:center;position:relative;min-height:0}.board{width:min(82vmin,460px);height:min(82vmin,460px);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:14px;position:relative}.cell{position:relative;width:100%;height:100%;min-width:0;min-height:0;padding:0;overflow:hidden;appearance:none;-webkit-appearance:none;touch-action:manipulation;border-radius:28px;background:linear-gradient(180deg,#fff,#eef3ff);box-shadow:0 12px 0 rgba(23,34,59,.09),0 18px 32px rgba(0,0,0,.14);display:grid;place-items:center;font-size:clamp(58px,10vmin,112px);font-weight:1000;line-height:1;cursor:pointer;transition:filter .14s ease,box-shadow .14s ease,background .18s ease}.cell:hover{filter:brightness(1.03)}.cell:active{transform:none!important}.cell.disabled{cursor:not-allowed}.mark{width:100%;height:100%;display:grid;place-items:center;pointer-events:none;line-height:1;transform:scale(.25) rotate(-12deg);opacity:0;animation:pop .22s cubic-bezier(.18,1.6,.45,1) forwards}.mark.x{color:var(--x);text-shadow:0 8px 18px rgba(255,79,123,.22)}.mark.o{color:var(--o);text-shadow:0 8px 18px rgba(46,179,255,.25)}@keyframes pop{to{transform:scale(1) rotate(0);opacity:1}}
    .winning .cell.win{background:linear-gradient(180deg,#eafff0,#c7ffd9);box-shadow:0 12px 0 rgba(27,215,96,.18),0 18px 32px rgba(0,0,0,.14)}.winning .cell:not(.win){filter:saturate(.45);opacity:.62}

    .options-details{position:relative;z-index:20;background:rgba(255,255,255,.58);border-radius:22px;padding:8px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.65)}.options-details[open]{z-index:60}.options-details summary{list-style:none;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:18px;padding:13px 14px;font-size:14px;font-weight:1000;cursor:pointer;background:#fff;box-shadow:var(--soft)}.options-details summary::-webkit-details-marker{display:none}.options-details summary::after{content:'▴';font-size:14px;transition:transform .18s ease}.options-details[open] summary::after{transform:rotate(180deg)}.options-grid{position:absolute;left:0;right:0;bottom:calc(100% + 8px);display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:12px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-radius:22px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.72)}.options-grid .wide{grid-column:1/-1}.danger{color:#fff;background:linear-gradient(135deg,#ff4f7b,#ff8a3d)}.need-confirm{background:#17223b!important;color:#fff!important}.toast{position:absolute;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);padding:13px 18px;border-radius:18px;background:rgba(23,34,59,.92);color:#fff;font-weight:900;opacity:0;pointer-events:none;transition:.25s ease;z-index:5}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}.piece{position:absolute;width:10px;height:16px;border-radius:4px;top:-20px;animation:fall 950ms ease-in forwards}@keyframes fall{to{transform:translateY(760px) rotate(420deg);opacity:.05}}

    .champion-screen{position:fixed;inset:0;z-index:50;display:grid;place-items:center;text-align:center;padding:28px;background:radial-gradient(circle at 20% 10%,rgba(255,255,255,.36),transparent 26%),radial-gradient(circle at 80% 20%,rgba(255,183,3,.38),transparent 30%),linear-gradient(135deg,#17223b,#6c63ff 55%,#23c4ed);color:#fff;opacity:0;pointer-events:none;transform:scale(1.02);transition:opacity .28s ease,transform .28s ease}.champion-screen.show{opacity:1;pointer-events:auto;transform:scale(1)}.champion-content{width:min(92vw,760px);display:grid;gap:14px;justify-items:center}.champion-icon{font-size:clamp(84px,18vmin,170px);line-height:.9;filter:drop-shadow(0 18px 24px rgba(0,0,0,.28));animation:trophyPulse 1.15s ease-in-out infinite alternate}.champion-title{font-size:clamp(34px,9vmin,82px);line-height:.92;margin:0;font-weight:1000;letter-spacing:-2px;text-shadow:0 14px 30px rgba(0,0,0,.25)}.champion-name{font-size:clamp(28px,7vmin,64px);font-weight:1000;color:#ffdd6e;text-shadow:0 10px 26px rgba(0,0,0,.28)}.champion-score{font-size:clamp(18px,4vmin,34px);font-weight:1000;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);padding:12px 22px;border-radius:999px;backdrop-filter:blur(12px)}.champion-screen .primary{width:min(88vw,340px);margin-top:10px}@keyframes trophyPulse{from{transform:scale(.98) rotate(-2deg)}to{transform:scale(1.05) rotate(2deg)}}

    @media (max-width:820px){body{overflow:auto}.app{height:auto;min-height:100dvh;width:100vw;grid-template-columns:1fr;padding:12px;gap:12px}.panel{order:2}.game-card{order:1;min-height:58dvh;grid-template-rows:78px 1fr}.board{width:min(91vw,430px);height:min(91vw,430px);gap:10px}.cell{border-radius:22px}.scoreboard{margin-top:6px}h1{font-size:28px}.panel{padding:18px}.status{width:min(91vw,430px)}.status-text{font-size:16px}}
    @media (max-width:420px){.name-row{grid-template-columns:1fr}.segmented.three{grid-template-columns:1fr}.segmented.five{grid-template-columns:repeat(5,1fr)}.options-grid{grid-template-columns:1fr}.status{padding:10px}.turn-badge{width:38px;height:38px;font-size:22px}.board{gap:8px}.cell{border-radius:18px}.game-card{padding:14px}.panel{padding:14px}}
  </style>
</head>
<body>
  <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div><div class="bubble b4"></div>

  <main class="app" aria-label="Juego de Tic Tac Toe">
    <aside class="panel">
      <div class="logo"><div class="logo-mark">XO</div><h1>Tic Tac Toe</h1></div>

      <div class="section-title">Modo</div>
      <div class="segmented" role="group" aria-label="Modo de juego">
        <button id="modeCpu" class="active" type="button">1 jugador</button>
        <button id="modeHuman" type="button">2 jugadores</button>
      </div>

      <div class="section-title">Victorias</div>
      <div class="segmented five" role="group" aria-label="Victorias para ganar">
        <button class="goal" data-goal="1" type="button">1</button>
        <button class="goal" data-goal="2" type="button">2</button>
        <button class="goal active" data-goal="3" type="button">3</button>
        <button class="goal" data-goal="4" type="button">4</button>
        <button class="goal" data-goal="5" type="button">5</button>
      </div>

      <div class="section-title cpu-only">Dificultad</div>
      <div class="segmented three cpu-only" role="group" aria-label="Dificultad">
        <button class="diff" data-diff="easy" type="button">Fácil</button>
        <button class="diff active" data-diff="normal" type="button">Normal</button>
        <button class="diff" data-diff="hard" type="button">Difícil</button>
      </div>

      <div class="section-title">Jugadores</div>
      <div class="name-row">
        <div class="field"><label for="nameX">Jugador X</label><input id="nameX" value="Jugador 1" maxlength="14" /></div>
        <div class="field"><label for="nameO">Jugador O</label><input id="nameO" value="Computadora" maxlength="14" /></div>
      </div>

      <div class="scoreboard" aria-label="Marcador">
        <div class="score x"><div class="label">X</div><div class="num" id="scoreX">0</div></div>
        <div class="score"><div class="label">Empates</div><div class="num" id="scoreD">0</div></div>
        <div class="score o"><div class="label">O</div><div class="num" id="scoreO">0</div></div>
      </div>

      <details class="options-details" id="optionsBox">
        <summary id="optionsSummary">Mostrar opciones</summary>
        <div class="options-grid">
          <button class="primary wide" id="newMatch" type="button">Nueva partida</button>
          <button class="ghost" id="restartRound" type="button">Reiniciar ronda</button>
          <button class="ghost danger" id="resetScore" type="button">Borrar marcador</button>
          <button class="ghost" id="soundBtn" type="button">🔊 Sonido</button>
          <button class="ghost" id="fullBtn" type="button">⛶ Pantalla</button>
        </div>
      </details>
    </aside>

    <section class="game-card">
      <div class="confetti" id="confetti"></div>
      <div class="topbar">
        <div class="status" id="status" aria-live="polite">
          <div class="turn-badge" id="turnBadge">X</div>
          <div><div class="status-text" id="statusText">Turno</div><div class="status-sub" id="statusSub">Listo</div></div>
        </div>
      </div>
      <div class="board-wrap"><div class="board" id="board" role="grid" aria-label="Tablero de Tic Tac Toe"></div></div>
      <div class="toast" id="toast">Mensaje</div>
    </section>
  </main>

  <section class="champion-screen" id="championScreen" aria-live="polite">
    <div class="confetti" id="championConfetti"></div>
    <div class="champion-content">
      <div class="champion-icon">🏆</div>
      <h2 class="champion-title">Ganador final</h2>
      <div class="champion-name" id="championName">Jugador</div>
      <div class="champion-score" id="championScore">0 - 0</div>
      <button class="primary" id="championNewMatch" type="button">Nueva partida</button>
    </div>
  </section>

  <script>
    (() => {
      'use strict';

      const boardEl = document.getElementById('board');
      const statusBox = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const statusSub = document.getElementById('statusSub');
      const turnBadge = document.getElementById('turnBadge');
      const modeCpu = document.getElementById('modeCpu');
      const modeHuman = document.getElementById('modeHuman');
      const diffButtons = [...document.querySelectorAll('.diff')];
      const goalButtons = [...document.querySelectorAll('.goal')];
      const cpuOnly = [...document.querySelectorAll('.cpu-only')];
      const nameX = document.getElementById('nameX');
      const nameO = document.getElementById('nameO');
      const newMatch = document.getElementById('newMatch');
      const restartRound = document.getElementById('restartRound');
      const resetScore = document.getElementById('resetScore');
      const scoreX = document.getElementById('scoreX');
      const scoreO = document.getElementById('scoreO');
      const scoreD = document.getElementById('scoreD');
      const toast = document.getElementById('toast');
      const soundBtn = document.getElementById('soundBtn');
      const fullBtn = document.getElementById('fullBtn');
      const optionsBox = document.getElementById('optionsBox');
      const optionsSummary = document.getElementById('optionsSummary');
      const confetti = document.getElementById('confetti');
      const championScreen = document.getElementById('championScreen');
      const championName = document.getElementById('championName');
      const championScore = document.getElementById('championScore');
      const championNewMatch = document.getElementById('championNewMatch');
      const championConfetti = document.getElementById('championConfetti');

      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      let cells = Array(9).fill('');
      let current = 'X';
      let nextStarter = Math.random() < 0.5 ? 'X' : 'O';
      let roundStarter = nextStarter;
      let locked = false;
      let mode = 'cpu';
      let difficulty = 'normal';
      let targetWins = 3;
      let matchOver = false;
      let soundOn = true;
      let score = { X:0, O:0, D:0 };
      let audioCtx = null;
      let roundTimer = null;

      function initBoard(){
        boardEl.innerHTML = '';
        for(let i=0;i<9;i++){
          const btn = document.createElement('button');
          btn.className = 'cell';
          btn.type = 'button';
          btn.dataset.index = i;
          btn.setAttribute('role','gridcell');
          btn.addEventListener('click', () => handleCell(i));
          boardEl.appendChild(btn);
        }
      }

      function playerName(mark){
        const fallback = mark === 'X' ? 'Jugador 1' : (mode === 'cpu' ? 'Computadora' : 'Jugador 2');
        const raw = mark === 'X' ? nameX.value.trim() : nameO.value.trim();
        return raw || fallback;
      }

      function setStatus(title, sub='', mark=current){
        clearTimeout(showMessage.timer);
        turnBadge.textContent = mark === 'D' ? '↔' : mark;
        turnBadge.classList.toggle('o', mark === 'O');
        statusText.textContent = title;
        statusSub.textContent = sub;
        statusBox.classList.add('show');
      }

      function showMessage(title, sub='', mark=current){
        setStatus(title, sub, mark);
      }

      function showTurn(){
        const starterText = current === roundStarter ? 'Inicia esta ronda' : `Meta: ${targetWins}`;
        setStatus(`Turno de ${playerName(current)}`, starterText, current);
      }

      function render(winLine=[]){
        [...boardEl.children].forEach((btn,i)=>{
          btn.innerHTML = cells[i] ? `<span class="mark ${cells[i].toLowerCase()}">${cells[i]}</span>` : '';
          btn.classList.toggle('disabled', !!cells[i] || locked);
          btn.classList.toggle('win', winLine.includes(i));
          btn.setAttribute('aria-label', cells[i] ? `Casilla ${i+1}: ${cells[i]}` : `Casilla ${i+1}: vacía`);
        });
        boardEl.classList.toggle('winning', winLine.length>0);
      }

      function startRound(showReady=true, starter=null){
        if(matchOver) return;
        clearTimeout(roundTimer);
        cells = Array(9).fill('');
        const chosenStarter = starter || nextStarter;
        roundStarter = chosenStarter;
        current = chosenStarter;
        if(!starter) nextStarter = chosenStarter === 'X' ? 'O' : 'X';
        locked = false;
        confetti.innerHTML = '';
        render();
        if(showReady) showTurn();
        if(mode === 'cpu' && current === 'O'){
          locked = true;
          render();
          setTimeout(cpuMove, 520);
        }
      }

      function startNewMatch(showToastMsg=true){
        clearTimeout(roundTimer);
        score = {X:0,O:0,D:0};
        matchOver = false;
        nextStarter = Math.random() < 0.5 ? 'X' : 'O';
        championScreen.classList.remove('show');
        updateScore();
        startRound(true);
        if(showToastMsg) showToast('Nueva partida');
      }

      function handleCell(index){
        if(locked || cells[index] || matchOver) return;
        if(mode === 'cpu' && current === 'O') return;
        makeMove(index, current);
      }

      function makeMove(index, mark){
        if(cells[index] || locked || matchOver) return;
        cells[index] = mark;
        playSound(mark === 'X' ? 510 : 390, .075);
        const result = checkResult(cells);
        render(result.line || []);
        if(result.done){
          endRound(result);
          return;
        }
        current = mark === 'X' ? 'O' : 'X';
        showTurn();
        if(mode === 'cpu' && current === 'O'){
          locked = true;
          render();
          setTimeout(cpuMove, 420);
        }
      }

      function cpuMove(){
        if(matchOver) return;
        const idx = chooseCpuMove();
        locked = false;
        if(idx !== -1) makeMove(idx, 'O');
      }

      function chooseCpuMove(){
        const empty = available(cells);
        if(empty.length === 0) return -1;
        if(difficulty === 'easy') return randomFrom(empty);
        if(difficulty === 'normal'){
          const win = findTacticalMove(cells,'O');
          if(win !== -1) return win;
          const block = findTacticalMove(cells,'X');
          if(block !== -1) return block;
          if(cells[4] === '') return 4;
          const corners = [0,2,6,8].filter(i=>cells[i]==='');
          if(corners.length) return randomFrom(corners);
          return randomFrom(empty);
        }
        return bestMove(cells);
      }

      function randomFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
      function available(state){return state.map((v,i)=>v===''?i:null).filter(v=>v!==null);}
      function findTacticalMove(state, mark){
        for(const line of wins){
          const vals = line.map(i=>state[i]);
          if(vals.filter(v=>v===mark).length===2 && vals.includes('')) return line[vals.indexOf('')];
        }
        return -1;
      }

      function bestMove(state){
        let bestScore = -Infinity;
        let move = -1;
        for(const idx of available(state)){
          state[idx] = 'O';
          const value = minimax(state, false, 0, -Infinity, Infinity);
          state[idx] = '';
          if(value > bestScore){bestScore = value; move = idx;}
        }
        return move;
      }

      function minimax(state, isMax, depth, alpha, beta){
        const result = checkResult(state);
        if(result.done){
          if(result.winner === 'O') return 10 - depth;
          if(result.winner === 'X') return depth - 10;
          return 0;
        }
        if(isMax){
          let best = -Infinity;
          for(const idx of available(state)){
            state[idx] = 'O';
            best = Math.max(best, minimax(state,false,depth+1,alpha,beta));
            state[idx] = '';
            alpha = Math.max(alpha,best);
            if(beta <= alpha) break;
          }
          return best;
        }
        let best = Infinity;
        for(const idx of available(state)){
          state[idx] = 'X';
          best = Math.min(best, minimax(state,true,depth+1,alpha,beta));
          state[idx] = '';
          beta = Math.min(beta,best);
          if(beta <= alpha) break;
        }
        return best;
      }

      function checkResult(state){
        for(const line of wins){
          const [a,b,c] = line;
          if(state[a] && state[a]===state[b] && state[b]===state[c]) return {done:true,winner:state[a],line};
        }
        if(state.every(Boolean)) return {done:true,winner:'D',line:[]};
        return {done:false,winner:null,line:[]};
      }

      function endRound(result){
        locked = true;
        clearTimeout(roundTimer);
        if(result.winner === 'D'){
          score.D++;
          updateScore();
          showMessage('Empate', 'Nueva ronda', 'D', 1050);
          playSound(240,.18);
          roundTimer = setTimeout(()=>startRound(true), 1200);
          return;
        }

        score[result.winner]++;
        updateScore();
        const name = playerName(result.winner);
        burstConfetti(confetti, 42);
        playWinTune();

        if(score[result.winner] >= targetWins){
          matchOver = true;
          showMessage(`Ganó ${name}`, 'Resultado final', result.winner, 900);
          roundTimer = setTimeout(()=>showChampion(name), 680);
        } else {
          showMessage(`Punto para ${name}`, `${score.X} - ${score.O}`, result.winner, 1050);
          roundTimer = setTimeout(()=>startRound(true), 1250);
        }
      }

      function showChampion(name){
        championName.textContent = name;
        championScore.textContent = `${playerName('X')} ${score.X} - ${score.O} ${playerName('O')}`;
        championScreen.classList.add('show');
        burstConfetti(championConfetti, 110, 2200);
      }

      function updateScore(){
        scoreX.textContent = score.X;
        scoreO.textContent = score.O;
        scoreD.textContent = score.D;
      }

      function setMode(next){
        mode = next;
        modeCpu.classList.toggle('active', mode === 'cpu');
        modeHuman.classList.toggle('active', mode === 'human');
        cpuOnly.forEach(el=>el.style.display = mode === 'cpu' ? '' : 'none');
        if(mode === 'cpu'){
          if(nameO.value.trim()==='' || nameO.value.trim()==='Jugador 2') nameO.value = 'Computadora';
        } else if(nameO.value.trim()==='' || nameO.value.trim()==='Computadora'){
          nameO.value = 'Jugador 2';
        }
        startNewMatch(false);
        showToast(mode === 'cpu' ? 'Modo 1 jugador' : 'Modo 2 jugadores');
      }

      function setDifficulty(diff){
        difficulty = diff;
        diffButtons.forEach(btn=>btn.classList.toggle('active', btn.dataset.diff === diff));
        startNewMatch(false);
        showToast(`Dificultad: ${diff === 'easy' ? 'fácil' : diff === 'normal' ? 'normal' : 'difícil'}`);
      }

      function setGoal(goal){
        targetWins = Number(goal);
        goalButtons.forEach(btn=>btn.classList.toggle('active', Number(btn.dataset.goal) === targetWins));
        startNewMatch(false);
        showToast(`Meta: ${targetWins}`);
      }

      function resetScores(){
        score = {X:0,O:0,D:0};
        matchOver = false;
        nextStarter = Math.random() < 0.5 ? 'X' : 'O';
        championScreen.classList.remove('show');
        updateScore();
        startRound(true);
        showToast('Marcador borrado');
      }

      function closeOptions(){
        if(optionsBox.open) optionsBox.open = false;
      }

      function confirmTap(button, message, action){
        if(button.dataset.confirming === 'yes'){
          clearTimeout(button.confirmTimer);
          button.dataset.confirming = 'no';
          button.classList.remove('need-confirm');
          button.textContent = button.dataset.originalText;
          action();
          return;
        }
        button.dataset.originalText = button.textContent;
        button.dataset.confirming = 'yes';
        button.classList.add('need-confirm');
        button.textContent = 'Confirmar';
        showToast(message);
        clearTimeout(button.confirmTimer);
        button.confirmTimer = setTimeout(()=>{
          button.dataset.confirming = 'no';
          button.classList.remove('need-confirm');
          button.textContent = button.dataset.originalText;
        }, 1800);
      }

      function showToast(message){
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(()=>toast.classList.remove('show'), 1200);
      }

      function getAudio(){
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playSound(freq=440,duration=.1){
        if(!soundOn) return;
        try{
          const ctx = getAudio();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(.055, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + duration);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + duration);
        }catch(e){}
      }

      function playWinTune(){
        if(!soundOn) return;
        [523,659,784].forEach((f,i)=>setTimeout(()=>playSound(f,.13), i*120));
      }

      function burstConfetti(target, amount=42, clearMs=1300){
        target.innerHTML = '';
        const colors = ['#ff4f7b','#2eb3ff','#ffb703','#1bd760','#6c63ff'];
        for(let i=0;i<amount;i++){
          const p = document.createElement('span');
          p.className = 'piece';
          p.style.left = `${Math.random()*100}%`;
          p.style.background = colors[i % colors.length];
          p.style.animationDelay = `${Math.random()*180}ms`;
          p.style.transform = `rotate(${Math.random()*180}deg)`;
          target.appendChild(p);
        }
        setTimeout(()=>target.innerHTML='', clearMs);
      }

      async function toggleFullscreen(){
        try{
          if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
          else await document.exitFullscreen();
        }catch(e){showToast('Pantalla no disponible');}
      }

      modeCpu.addEventListener('click',()=>setMode('cpu'));
      modeHuman.addEventListener('click',()=>setMode('human'));
      diffButtons.forEach(btn=>btn.addEventListener('click',()=>setDifficulty(btn.dataset.diff)));
      goalButtons.forEach(btn=>btn.addEventListener('click',()=>setGoal(btn.dataset.goal)));
      newMatch.addEventListener('click',()=>confirmTap(newMatch,'Confirmar nueva partida',()=>startNewMatch(true)));
      restartRound.addEventListener('click',()=>confirmTap(restartRound,'Confirmar reinicio',()=>startRound(true, roundStarter)));
      resetScore.addEventListener('click',()=>confirmTap(resetScore,'Confirmar borrado',resetScores));
      championNewMatch.addEventListener('click',()=>startNewMatch(false));
      soundBtn.addEventListener('click',()=>{soundOn=!soundOn;soundBtn.textContent=soundOn?'🔊 Sonido':'🔇 Sonido';showToast(soundOn?'Sonido activado':'Sonido apagado');});
      fullBtn.addEventListener('click',toggleFullscreen);
      optionsBox.addEventListener('toggle',()=>{optionsSummary.textContent = optionsBox.open ? 'Contraer opciones' : 'Mostrar opciones';});
      document.addEventListener('pointerdown', event => {
        if(!optionsBox.open) return;
        if(optionsBox.contains(event.target)) return;
        closeOptions();
      });
      document.addEventListener('keydown', event => {
        if(event.key === 'Escape') closeOptions();
      });
      nameX.addEventListener('input',()=>showTurn());
      nameO.addEventListener('input',()=>showTurn());

      initBoard();
      updateScore();
      startRound(true);
    })();
  </script>
</body>
</html>
