<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESL English</title>
  <style>
    :root {
      --text: #0f172a;
      --glass: rgba(255,255,255,.44);
      --line: rgba(255,255,255,.55);
      --shadow: 0 22px 70px rgba(15, 23, 42, .14);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      min-height: 100dvh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(96,165,250,.38), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(250,204,21,.30), transparent 28%),
        radial-gradient(circle at 65% 86%, rgba(134,239,172,.34), transparent 32%),
        linear-gradient(135deg, #eff6ff 0%, #fff7ed 52%, #f0fdf4 100%);
      display: grid;
      place-items: center;
      padding: clamp(22px, 5vw, 64px);
      overflow-x: hidden;
    }
    .shell { width: min(980px, 100%); display: grid; gap: clamp(34px, 6vw, 72px); }
    header { text-align: center; }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 11vw, 7.2rem);
      line-height: .9;
      letter-spacing: -.07em;
      font-weight: 900;
      text-wrap: balance;
    }
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: clamp(12px, 2.2vw, 20px);
    }
    .tile {
      min-height: clamp(120px, 18vw, 168px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: grid;
      place-items: center;
      text-decoration: none;
      color: #0f172a;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .tile:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,.64);
      box-shadow: 0 28px 86px rgba(15, 23, 42, .18);
    }
    .tile span {
      font-size: clamp(1.15rem, 2.5vw, 1.7rem);
      font-weight: 850;
      letter-spacing: -.03em;
      text-align: center;
    }
    .return-activity-btn {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 30;
      display: none;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      max-width: min(320px, calc(100vw - 28px));
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 999px;
      background: rgba(255,255,255,.46);
      color: #0f172a;
      box-shadow: 0 16px 42px rgba(15,23,42,.16);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 10px 16px 10px 12px;
      font-weight: 850;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .return-activity-btn.show { display: inline-flex; }
    .return-activity-btn:hover {
      transform: translateY(-2px) scale(1.015);
      background: rgba(255,255,255,.68);
      box-shadow: 0 20px 52px rgba(15,23,42,.20);
    }
    .return-activity-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .return-activity-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty-message {
      text-align: center;
      font-weight: 800;
      color: #475569;
      background: rgba(255,255,255,.52);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 24px;
      padding: 22px;
      backdrop-filter: blur(14px);
    }
    .powered-by {
      text-align: center;
      font-size: clamp(.76rem, 1.8vw, .92rem);
      font-weight: 700;
      letter-spacing: .01em;
      color: rgba(15, 23, 42, .48);
      margin-top: -18px;
      user-select: none;
    }
    @media (max-width: 520px) {
      body { align-items: start; padding-top: 58px; }
      .tiles { grid-template-columns: 1fr 1fr; }
      .tile { min-height: 112px; border-radius: 22px; }
      h1 { font-size: clamp(3.1rem, 16vw, 5rem); }
      .return-activity-btn { left: 12px; right: 12px; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="ESL English">
    <header><h1>ESL English</h1></header>
    <section class="tiles" id="activityTiles" aria-label="Actividades"></section>
    <footer class="powered-by">Powered by Lcdo. Ricardo Quishpe</footer>
  </main>

  <button class="return-activity-btn" id="returnActivityBtn" type="button" aria-label="Regresar a la actividad anterior">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/><path d="M9 12h12"/><path d="M5 5v14"/></svg>
    <span id="returnActivityText">Volver a la actividad</span>
  </button>

  <script>
    const fallbackActivities = [
      { title: "Anagrama", file: "Anagrama.html", enabled: true },
      { title: "Flashcards", file: "Flashcards.html", enabled: true },
      { title: "Hangman", file: "Hangman Game.html", enabled: true },
      { title: "Memory Game", file: "Memory Game.html", enabled: true },
      { title: "Word Match", file: "Word Match.html", enabled: true },
      { title: "Wordsearch", file: "Wordsearch.html", enabled: true }
    ];

    function renderActivities(activities) {
      const container = document.getElementById("activityTiles");
      const list = (activities || []).filter(activity => activity && activity.enabled !== false && activity.file && activity.title);
      container.innerHTML = "";
      if (!list.length) {
        container.innerHTML = '<div class="empty-message">No hay actividades activas.</div>';
        return;
      }
      list.forEach(activity => {
        const link = document.createElement("a");
        link.className = "tile";
        link.href = activity.file;
        link.innerHTML = `<span>${activity.title}</span>`;
        link.addEventListener("click", () => {
          try {
            sessionStorage.removeItem("ESL_HOME_FROM_ACTIVITY");
          } catch (error) {}
        });
        container.appendChild(link);
      });
    }

    function setupReturnButton() {
      const button = document.getElementById("returnActivityBtn");
      const label = document.getElementById("returnActivityText");
      let lastUrl = "";
      let lastTitle = "";
      let cameFromActivity = false;
      try {
        lastUrl = sessionStorage.getItem("ESL_LAST_ACTIVITY_URL") || "";
        lastTitle = sessionStorage.getItem("ESL_LAST_ACTIVITY_TITLE") || "";
        cameFromActivity = sessionStorage.getItem("ESL_HOME_FROM_ACTIVITY") === "1";
      } catch (error) {}

      if (!cameFromActivity && !lastUrl) return;
      if (lastTitle) label.textContent = `Volver a ${lastTitle}`;
      button.classList.add("show");

      button.addEventListener("click", () => {
        if (cameFromActivity && history.length > 1) {
          let fallbackTimer = null;
          const clearFallback = () => { if (fallbackTimer) clearTimeout(fallbackTimer); };
          window.addEventListener("pagehide", clearFallback, { once: true });
          fallbackTimer = setTimeout(() => {
            if (lastUrl) window.location.href = lastUrl;
          }, 450);
          history.back();
          return;
        }
        if (lastUrl) window.location.href = lastUrl;
      });
    }

    function getManifestSessionVersion() {
      try {
        let version = sessionStorage.getItem("ESL_MANIFEST_SESSION_VERSION");
        if (!version) {
          version = String(Date.now());
          sessionStorage.setItem("ESL_MANIFEST_SESSION_VERSION", version);
        }
        return version;
      } catch (error) {
        return String(Date.now());
      }
    }

    function readSessionManifest() {
      try {
        return JSON.parse(sessionStorage.getItem("ESL_SESSION_MANIFEST") || "null");
      } catch (error) {
        return null;
      }
    }

    function writeSessionManifest(manifest) {
      try {
        sessionStorage.setItem("ESL_SESSION_MANIFEST", JSON.stringify(manifest));
      } catch (error) {}
    }

    async function loadManifest() {
      try {
        const cachedManifest = readSessionManifest();
        if (cachedManifest && Array.isArray(cachedManifest.activities)) {
          renderActivities(cachedManifest.activities);
          return;
        }

        const response = await fetch(`activities-manifest.json?v=${encodeURIComponent(getManifestSessionVersion())}`, { cache: "no-store" });
        if (!response.ok) throw new Error("No manifest");
        const manifest = await response.json();
        writeSessionManifest(manifest);
        renderActivities(manifest.activities);
      } catch (error) {
        renderActivities(fallbackActivities);
      }
    }

    setupReturnButton();
    loadManifest();
  </script>
</body>
</html>
